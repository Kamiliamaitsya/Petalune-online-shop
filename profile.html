<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Petalune</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <aside class="profile-sidebar">
        <h1 class="sidebar-title">Account Settings</h1>
        <div class="pic-container-large">
            <img src="image/profile.png" alt="Profile Picture">
        </div>
        <div class="sidebar-name">Kamilia Maitsya</div>
        <a href="login.html" class="sidebar-logout">Logout</a>
    </aside>

    <main class="profile-main">
        
        <nav class="profile-nav">
            <a href="home.html" class="nav-link">Home</a>
            <a href="blackpacked.html" class="nav-link">My Orders</a>
            <a href="cart-empty.html" class="nav-link">Cart</a>
            <div class="nav-pic">
                <img src="image/profile.png" alt="Profile Pic">
            </div>
        </nav>

        <div class="profile-content">
            
            <div class="section-header">
                <a href="home.html" class="back-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </a>
                <h2 class="section-title">Profile Information</h2>
            </div>

            <div class="pic-row-container">
                <div class="data-label">Profile Picture</div>
                <div class="pic-actions">
                    <div class="pic-preview">
                        <img src="image/profile.png" alt="Profile Picture">
                    </div>
                    <div class="pic-text">
                        <span>Upload New Picture</span>
                        <a href="#">Remove</a>
                    </div>
                </div>
            </div>

            <div class="data-table">
                <div class="data-row">
                    <div class="data-label">Name</div>
                    <div class="data-value">Kamilia Maitsya</div>
                </div>
                <div class="data-row">
                    <div class="data-label">Date Of Birth</div>
                    <div class="data-value">January 01, 2026</div>
                </div>
                <div class="data-row">
                    <div class="data-label">Email</div>
                    <div class="data-value"></div>
                </div>
                <div class="data-row">
                    <div class="data-label">Address</div>
                    <div class="data-value">Burangrang, 08, Bandung</div>
                </div>
            </div>

            <div class="account-info-header">
                <h2>Account Information</h2>
            </div>

            <div class="data-table">
                <div class="data-row">
                    <div class="data-label">Username</div>
                    <div class="data-value">Kamilia Maitsya</div>
                </div>
                <div class="data-row">
                    <div class="data-label">Password</div>
                    <div class="data-value dots">&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;</div>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
