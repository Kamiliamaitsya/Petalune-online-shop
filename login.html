<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Petalune</title>
    <meta name="description" content="Login to your Petalune account and continue shopping your favorite handmade accessories.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-wrapper">

        <div class="login-image-panel">
            <img src="image/foto5.png" alt="Petalune Jewelry" class="login-photo">
            <div class="image-overlay"></div>
            <p class="brand-watermark">P E T A L U N E</p>
        </div>

        <div class="login-form-panel">
            <div class="login-box">

                <div class="login-logo">
                    <a href="index.html" class="logo">
                        <span class="logo-icon">
                            <img src="image/logo.png" alt="P" class="logo-img">
                        </span>
                        <span class="logo-text-login">etalune</span>
                    </a>
                    <p class="login-tagline">Soft Details, Made with Care</p>
                </div>

                <p class="welcome-text">Welcome back! Log in to continue shopping with Petalune.</p>

                <form class="login-form" action="home.html" method="GET" id="loginForm">
                    <div class="input-group">
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="login-input"
                            placeholder="Enter Username"
                            autocomplete="username"
                        >
                    </div>

                    <div class="input-group">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="login-input"
                            placeholder="Enter Password"
                            autocomplete="current-password"
                        >
                    </div>

                    <div class="forgot-wrapper">
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">Log in</button>
                </form>

                <p class="register-link">Don't have an account? <a href="#">Sign up</a></p>

            </div>
        </div>

    </div>

</body>
</html>
